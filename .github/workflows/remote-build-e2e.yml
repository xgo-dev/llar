name: Remote Build E2E

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
      - "!dependabot/**"
      - "!xgopilot/**"
  pull_request_target:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  remote-build-e2e:
    name: llar make -> GHCR -> Postgres
    runs-on: ubuntu-latest
    environment: ghcr-e2e

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: llar
          POSTGRES_PASSWORD: llar
          POSTGRES_DB: llar_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U llar -d llar_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x

      - name: Download Go modules
        run: go mod download

      - name: Install llar
        run: |
          go install -ldflags="-checklinkname=0" ./cmd/llar
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run remote build E2E
        env:
          GHCR_OWNER: ${{ secrets.GHCR_OWNER || github.repository_owner }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        run: >-
          go run ./testdata/remote-build-e2e
          --ghcr-owner "$GHCR_OWNER"
          --ghcr-username "$GHCR_USERNAME"
          --ghcr-token "$GHCR_TOKEN"
